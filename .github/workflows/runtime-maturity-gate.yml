name: Runtime Maturity Gate

on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

  dry-maturity:
    name: Dry maturity gate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run maturity gate without required live credentials
        run: npm run runtime:maturity-gate

      - name: Upload maturity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-maturity-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            out/maturity-gate/**
            out/agent-e2e/**

